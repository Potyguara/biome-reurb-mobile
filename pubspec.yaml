name: biome_reurb
description: Aplicativo BIOME REURB para cadastro social, físico, selagem e coleta offline em projetos de Regularização Fundiária Urbana.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1

  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  dio: ^5.9.2
  flutter_secure_storage: ^9.2.4

  flutter_map: ^7.0.2
  flutter_map_mbtiles: ^1.0.4
  flutter_map_dragmarker: ^7.0.0
  sqlite3: ^2.4.7

  latlong2: ^0.9.1
  geolocator: ^12.0.0

  image_picker: ^1.2.2
  file_picker: ^8.0.6
  permission_handler: ^11.4.0

  intl: ^0.19.0
  uuid: ^4.5.3
  qr_flutter: ^4.1.0
  signature: ^5.5.0
  share_plus: ^11.1.0
  pdf: ^3.11.1

  archive: ^3.6.1
  excel: ^4.0.6
  xml: ^6.5.0
  
  

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  drift_dev: ^2.28.3
  build_runner: ^2.6.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logomarca.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/logomarca.png"
  remove_alpha_ios: true
